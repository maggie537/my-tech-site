# Hugo configuration file
title: SB Tech Gal

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Services
      pageRef: "/#services-page"  # Points to the services section on the home page
      weight: 1
    - name: Contact
      pageRef: "/#contact"        # Points to the contact section on the home page
      weight: 3

params:
  navbar:
    displayTitle: true    # Keeps your text title "SB Tech Gal" next to the logo
    logo: "logo.jpg"       # Points directly to your uploaded asset in the static folder
    displayLogo: true     # Instantly activates the graphic container

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: false
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
    
  icon:
    favicon: favicon.ico

  custom_css: ["style.css"]

  toc:
    enable: false
